workflows:
  android-debug:
    name: Android Debug APK (for testing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        NODE_VERSION: "20"
      node: $NODE_VERSION
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add Android platform if missing
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Patch AndroidManifest for GPS and notifications
        script: bash scripts/patch-android-manifest.sh
      - name: Verify location permissions in manifest
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q 'android.permission.ACCESS_FINE_LOCATION' "$MANIFEST"
          grep -q 'android.permission.ACCESS_COARSE_LOCATION' "$MANIFEST"
          echo "Location permissions verified in AndroidManifest.xml"
      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - attendance_keystore
      vars:
        NODE_VERSION: "20"
      node: $NODE_VERSION
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add Android platform if missing
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Patch AndroidManifest for GPS and notifications
        script: bash scripts/patch-android-manifest.sh
      - name: Verify location permissions in manifest
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q 'android.permission.ACCESS_FINE_LOCATION' "$MANIFEST"
          grep -q 'android.permission.ACCESS_COARSE_LOCATION' "$MANIFEST"
          echo "Location permissions verified in AndroidManifest.xml"
      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com
        notify:
          success: true
          failure: true
